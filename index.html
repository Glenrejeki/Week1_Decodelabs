<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link-in-Bio | DecodeLabs Project 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="profile-header">
            <div class="profile-image-container">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=DecodeLabs" alt="Profile Picture" class="profile-image">
            </div>
            <h1 class="profile-name">DecodeLabs Intern</h1>
            <p class="profile-bio">Building the future of web interfaces, one link at a time. 🚀</p>
        </header>

        <section class="links-container">
            <a href="https://github.com/decodelabs" target="_blank" class="link-button">
                <span class="link-text">GitHub Portfolio</span>
            </a>
            <a href="https://linkedin.com/company/decodelabs" target="_blank" class="link-button">
                <span class="link-text">LinkedIn Profile</span>
            </a>
            <a href="https://instagram.com/decodelabs" target="_blank" class="link-button">
                <span class="link-text">Instagram</span>
            </a>
            <a href="mailto:hello@decodelabs.id" class="link-button">
                <span class="link-text">Contact Me</span>
            </a>
        </section>

        <footer class="actions-footer">
            <button id="copy-btn" class="action-button" aria-label="Copy profile link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                <span>Copy Link</span>
            </button>
            <button id="share-btn" class="action-button" aria-label="Share profile">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                <span>Share</span>
            </button>
        </footer>
        
        <div id="toast" class="toast hidden">Link copied to clipboard!</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
